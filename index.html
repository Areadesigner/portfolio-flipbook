<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Flipbook</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
}

.container {
  display: flex;
  height: 100vh;
  transition: transform 0.6s ease-in-out;
}

.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.buttons {
  position: fixed;
  width: 100%;
  top: 65%;
  display: flex;
  justify-content: space-between;
  transform: translateY(-50%);
}

button {
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 20px;
  cursor: pointer;
  font-size: 20px;
}
</style>

</head>
<body>

<div class="container" id="slider"></div>

<div class="buttons">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>
const totalPages = 6;
let index = 0;

const slider = document.getElementById("slider");

// Crear páginas sin cargar imágenes aún
for (let i = 1; i <= totalPages; i++) {
  const page = document.createElement("div");
  page.className = "page";

  const img = document.createElement("img");

  // SOLO carga imagen visible o cercana
  if (i === 1 || i === 2) {
    img.src = `page${i}.jpg`;
  } else {
    img.dataset.src = `page${i}.jpg`; // se carga después
  }

  page.appendChild(img);
  slider.appendChild(page);
}

slider.style.width = (totalPages * 100) + "vw";

function loadImage(i) {
  const page = document.querySelectorAll(".page img")[i];
  if (page && page.dataset.src) {
    page.src = page.dataset.src;
    page.removeAttribute("data-src");
  }
}

function updateSlide() {
  slider.style.transform = `translateX(-${index * 100}vw)`;

  // cargar actual + siguiente
  loadImage(index);
  loadImage(index + 1);
}

function next() {
  if (index < totalPages - 1) {
    index++;
    updateSlide();
  }
}

function prev() {
  if (index > 0) {
    index--;
    updateSlide();
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipbook Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
}

/* SLIDER */
.container {
  display: flex;
  height: 100vh;
  transition: transform 0.5s ease;
}

.page {
  flex: 0 0 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* FLECHAS */
.buttons {
  position: fixed;
  width: 100%;
  top: 55%;
  display: flex;
  justify-content: space-between;
  transform: translateY(-50%);
  z-index: 10;
  padding: 0 20px;
}

button {
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 18px 22px;
  cursor: pointer;
  font-size: 22px;
  border-radius: 8px;
}
</style>

</head>
<body>

<div class="container" id="slider"></div>

<div class="buttons">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>

const totalPages = 6; // 🔥 cámbialo a 50 cuando quieras
let index = 0;

const slider = document.getElementById("slider");

/* CREAR PÁGINAS */
for (let i = 1; i <= totalPages; i++) {
  const page = document.createElement("div");
  page.className = "page";

  const img = document.createElement("img");
  img.src = `page${i}.jpg`;

  page.appendChild(img);
  slider.appendChild(page);
}

/* MOVER */
function update() {
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

/* BOTONES */
function next() {
  if (index < totalPages - 1) {
    index++;
    update();
  }
}

function prev() {
  if (index > 0) {
    index--;
    update();
  }
}

</script>

</body>
</html>

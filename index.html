<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ángel Rea Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #0e0e0e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #book {
      width: 900px;
      height: 600px;
    }

    .page {
      background: white;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fix de render */
    .stf__wrapper {
      transform: translateZ(0);
    }
  </style>
</head>

<body>

<div id="book"></div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>
  window.addEventListener("load", () => {

    const book = document.getElementById("book");

    // 🔥 SOLO 6 PÁGINAS PARA PRUEBA
    const totalPages = 6;

    for (let i = 1; i <= totalPages; i++) {
      const page = document.createElement("div");
      page.className = "page";

      const img = document.createElement("img");
      img.src = `page${i}.jpg`;

      page.appendChild(img);
      book.appendChild(page);
    }

    const pageFlip = new St.PageFlip(book, {
      width: 450,
      height: 600,
      size: "stretch",
      maxShadowOpacity: 0.8,
      showCover: true,
      mobileScrollSupport: false,
      drawShadow: true,
      flippingTime: 800
    });

    pageFlip.loadFromHTML(document.querySelectorAll(".page"));

  });
</script>

</body>
</html>

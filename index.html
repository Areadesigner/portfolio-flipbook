<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Flipbook</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    .container {
      display: flex;
      height: 100vh;
      transition: transform 0.6s ease-in-out;
    }

    .page {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .buttons {
      position: fixed;
      width: 100%;
      top: 40%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
    }

    button {
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 20px;
      cursor: pointer;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div class="container" id="slider"></div>

<div class="buttons">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>
  const totalPages = 6; // 🔥 CAMBIAS SOLO ESTO
  let index = 0;

  const slider = document.getElementById("slider");

  // Crear páginas automáticamente
  for (let i = 1; i <= totalPages; i++) {
    const page = document.createElement("div");
    page.className = "page";

    const img = document.createElement("img");
    img.src = `page${i}.jpg`;

    page.appendChild(img);
    slider.appendChild(page);
  }

  // Ajustar ancho automáticamente
  slider.style.width = (totalPages * 100) + "vw";

  function updateSlide() {
    slider.style.transform = `translateX(-${index * 100}vw)`;
  }

  function next() {
    if (index < totalPages - 1) {
      index++;
      updateSlide();
    }
  }

  function prev() {
    if (index > 0) {
      index--;
      updateSlide();
    }
  }
</script>

</body>
</html>

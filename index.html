<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ángel Rea Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #0e0e0e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #book {
      width: 900px;
      height: 600px;
    }

    .page {
      background: white;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🔥 SOMBRAS MÁS REALISTAS */
    .stf__wrapper {
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
  </style>
</head>

<body>

<div id="book"></div>

<!-- LIBRERÍA -->
<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>

<!-- 🔊 SONIDO -->
<audio id="flipSound" src="https://www.fesliyanstudios.com/play-mp3/387" preload="auto"></audio>

<script>
  const book = document.getElementById("book");
  const sound = document.getElementById("flipSound");

  const totalPages = 6;

  // 📕 CREAR PÁGINAS
  for (let i = 1; i <= totalPages; i++) {
    const page = document.createElement("div");
    page.className = "page";

    const img = document.createElement("img");
    img.src = `page${i}.jpg`;

    page.appendChild(img);
    book.appendChild(page);
  }

  // 📚 FLIPBOOK
  const pageFlip = new St.PageFlip(book, {
    width: 450,
    height: 600,
    size: "stretch",
    maxShadowOpacity: 0.9,   // 🔥 sombras más fuertes
    showCover: true,         // 📕 portada fija
    mobileScrollSupport: false,
    drawShadow: true,
    flippingTime: 800
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));

  // 🔊 SONIDO AL PASAR PÁGINA
  pageFlip.on("flip", () => {
    sound.currentTime = 0;
    sound.play();
  });
</script>

</body>
</html>

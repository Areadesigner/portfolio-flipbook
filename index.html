<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Flipbook</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    .container {
      display: flex;
      width: 600vw; /* 6 páginas */
      height: 100vh;
      transition: transform 0.6s ease-in-out;
    }

    .page {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .buttons {
      position: fixed;
      width: 100%;
      top: 65%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
    }

    button {
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 20px;
      cursor: pointer;
      font-size: 20px;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div class="container" id="slider">
  <div class="page"><img src="page1.jpg"></div>
  <div class="page"><img src="page2.jpg"></div>
  <div class="page"><img src="page3.jpg"></div>
  <div class="page"><img src="page4.jpg"></div>
  <div class="page"><img src="page5.jpg"></div>
  <div class="page"><img src="page6.jpg"></div>
</div>

<div class="buttons">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>
  let index = 0;
  const slider = document.getElementById("slider");

  function updateSlide() {
    slider.style.transform = `translateX(-${index * 100}vw)`;
  }

  function next() {
    if (index < 5) {
      index++;
      updateSlide();
    }
  }

  function prev() {
    if (index > 0) {
      index--;
      updateSlide();
    }
  }
</script>

</body>
</html>

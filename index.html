<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Flipbook</title>

<style>
body {
  margin: 0;
  overflow: hidden; /* 🔥 evita scroll libre */
  background: #111;
}

.container {
  display: flex;
  height: 100vh;
  width: 100vw;
  transition: transform 0.5s ease;
  will-change: transform;
}

.page {
  min-width: 100vw; /* 🔥 clave: bloquea múltiples páginas visibles */
  height: 100vh;
  flex-shrink: 0;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* BOTONES */
.buttons {
  position: fixed;
  width: 100%;
  top: 45%;
  display: flex;
  justify-content: space-between;
  transform: translateY(-50%);
  z-index: 10;
}

button {
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 18px 25px;
  cursor: pointer;
  font-size: 20px;
  border-radius: 8px;
}
</style>

</head>
<body>

<div class="container" id="slider"></div>

<div class="buttons">
  <button onclick="prev()">◀</button>
  <button onclick="next()">▶</button>
</div>

<script>
const totalPages = 6;
let index = 0;

const slider = document.getElementById("slider");

// crear páginas
for (let i = 1; i <= totalPages; i++) {
  const page = document.createElement("div");
  page.className = "page";

  const img = document.createElement("img");
  img.src = `page${i}.jpg`;

  page.appendChild(img);
  slider.appendChild(page);
}

function updateSlide() {
  slider.style.transform = `translateX(-${index * 100}vw)`;
}

function next() {
  if (index < totalPages - 1) {
    index++;
    updateSlide();
  }
}

function prev() {
  if (index > 0) {
    index--;
    updateSlide();
  }
}
</script>

</body>
</html>
